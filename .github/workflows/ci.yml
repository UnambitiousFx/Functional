name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2022, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Functional.slnx

      - name: Build
        run: dotnet build Functional.slnx --no-restore --configuration Release

      - name: Test (coverage + TRX)
        run: >
          dotnet test Functional.slnx
          --no-build
          --configuration Release
          --results-directory ./test-results
          --coverage
          --coverage-output-format cobertura
          --coverage-settings ./test/coverage.settings.xml
          --report-trx

      - name: Convert TRX to JUnit (for Codecov test results)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet tool install --global trx2junit
          trx2junit ./test-results/*.trx --output ./test-results/junit

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          files: ./test-results/*.cobertura.xml
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: ./test-results/junit/*.xml
          token: ${{ secrets.CODECOV_TOKEN }}
